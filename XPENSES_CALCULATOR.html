<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xpenses Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens ── */
:root {
  --bg-page:      #f0ede8;
  --bg-card:      #ffffff;
  --bg-sub:       #f0eee9;
  --bg-hover:     #e8e5e0;
  --text-1:       #1a1917;
  --text-2:       #6b6962;
  --text-3:       #9e9c96;
  --border-1:     rgba(0,0,0,0.10);
  --border-2:     rgba(0,0,0,0.18);
  --r-md:         8px;
  --r-lg:         14px;
  --r-xl:         18px;
  /* Semantic colours */
  --green:        #0a7a5e;
  --green-border: #1aaa84;
  --green-bg:     #e8f5f0;
  --green-box:    #c2e8da;
  --blue:         #1a5fa8;
  --blue-border:  #3d8fe0;
  --blue-bg:      #e8f1fb;
  --blue-box:     #b8d4f5;
  --red:          #a82d2d;
  --red-border:   #e04545;
  --purple:       #5b4eba;
  --purple-border:#8070e0;
  --purple-bg:    #edeafc;
  --amber:        #8a5200;
  --amber-border: #c47a00;
  /* Tab accent — Now is teal (different from Drive blue), FIRE is orange */
  --tab-now:      #0d8a6a;
  --tab-fire:     #b84a00;
  /* Fonts */
  --font-ui:      'Inter', system-ui, -apple-system, sans-serif;
  --font-logo:    'Plus Jakarta Sans', system-ui, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-page:      #141412;
    --bg-card:      #1e1d1b;
    --bg-sub:       #272521;
    --bg-hover:     #2e2c28;
    --text-1:       #e8e5dc;
    --text-2:       #9e9b93;
    --text-3:       #6b6860;
    --border-1:     rgba(255,255,255,0.09);
    --border-2:     rgba(255,255,255,0.16);
    --green:        #4dbb98;
    --green-border: #1aaa84;
    --green-bg:     #0d2a20;
    --green-box:    #1a4a38;
    --blue:         #6aaae8;
    --blue-border:  #3d8fe0;
    --blue-bg:      #0d1e38;
    --blue-box:     #1a3a60;
    --red:          #e88080;
    --red-border:   #e04545;
    --purple:       #a898f0;
    --purple-border:#8070e0;
    --purple-bg:    #1e1840;
    --amber:        #e8a020;
    --amber-border: #c47a00;
    --tab-now:      #2ec99a;
    --tab-fire:     #e87040;
  }
}

/* ── Base ── */
body {
  font-family: var(--font-ui);
  background: var(--bg-page);
  color: var(--text-1);
  min-height: 100vh;
  padding-top: 72px; /* desktop: single-row header */
  -webkit-font-smoothing: antialiased;
}

/* ── Sticky header ── */
.sticky-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-1);
  box-shadow: 0 1px 12px rgba(0,0,0,0.07);
}

/* Desktop: one row — logo | tabs (center) | actions */
.header-row {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 1.5rem;
  gap: 16px;
  max-width: 1280px;
  margin: 0 auto;
}

/* Logo — left */
.header-logo {
  font-family: var(--font-logo);
  font-size: 19px;
  font-weight: 800;
  letter-spacing: -0.5px;
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
}
.logo-x    { color: var(--tab-now); }
.logo-rest { color: var(--text-1); }
.logo-sep  { color: var(--text-3); font-weight: 400; font-size: 14px; margin: 0 4px; }
.logo-calc { color: var(--text-3); font-weight: 600; font-size: 14px; }

/* Tabs — center */
.header-tabs {
  flex: 1;
  display: flex;
  justify-content: center;
}

.tabs {
  display: flex;
  background: var(--bg-sub);
  border-radius: 99px;
  padding: 3px;
  gap: 2px;
}

.tab-btn {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 26px;
  border: none;
  background: transparent;
  color: var(--text-2);
  border-radius: 99px;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.01em;
}
.tab-btn.active[data-tab="now"]  {
  background: var(--tab-now);
  color: #fff;
  box-shadow: 0 2px 10px rgba(13,138,106,0.40);
}
.tab-btn.active[data-tab="fire"] {
  background: var(--tab-fire);
  color: #fff;
  box-shadow: 0 2px 10px rgba(184,74,0,0.35);
}

/* Actions — right */
.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

/* Drive status below the header row */
.drive-status-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 20px;
  padding: 0 1.5rem;
  max-width: 1280px;
  margin: 0 auto;
}
.drive-status {
  font-family: var(--font-ui);
  font-size: 10.5px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 0.02em;
  transition: color 0.3s;
}
.drive-status.ok      { color: var(--green); }
.drive-status.err     { color: var(--red);   }
.drive-status.working { color: var(--amber); }

/* Mobile: stack logo + actions row, then tabs, then status */
@media (max-width: 680px) {
  body { padding-top: 120px; }
  .sticky-header { padding: 0; }
  .header-row {
    flex-wrap: wrap;
    height: auto;
    padding: 10px 1rem 6px;
    gap: 8px;
    justify-content: center;
  }
  .header-logo { order: 1; }
  .header-tabs { order: 3; width: 100%; }
  .header-actions { order: 2; margin-left: auto; }
  .drive-status-bar { padding: 0 1rem 6px; }
}

/* ── Buttons ── */
.hbtn {
  font-family: var(--font-ui);
  font-size: 11.5px;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 99px;
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.hbtn:hover    { background: var(--bg-hover); color: var(--text-1); }
.hbtn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Drive — Google blue */
.hbtn-drive {
  background: #1a73e8;
  border-color: #1a73e8;
  color: #fff;
  font-weight: 600;
}
.hbtn-drive:hover { background: #1558c0; border-color: #1558c0; color: #fff; }

/* Export — teal */
.hbtn-export {
  background: rgba(13,138,106,0.09);
  border-color: rgba(13,138,106,0.55);
  color: #0d8a6a;
}
.hbtn-export:hover { background: rgba(13,138,106,0.16); color: #0d8a6a; }
@media (prefers-color-scheme: dark) {
  .hbtn-export { background: rgba(46,201,154,0.10); border-color: rgba(46,201,154,0.45); color: #2ec99a; }
  .hbtn-export:hover { background: rgba(46,201,154,0.18); }
}

/* Import — violet */
.hbtn-import {
  background: rgba(91,78,186,0.09);
  border-color: rgba(91,78,186,0.50);
  color: #5b4eba;
}
.hbtn-import:hover { background: rgba(91,78,186,0.16); color: #5b4eba; }
@media (prefers-color-scheme: dark) {
  .hbtn-import { background: rgba(168,152,240,0.10); border-color: rgba(168,152,240,0.45); color: #a898f0; }
  .hbtn-import:hover { background: rgba(168,152,240,0.18); }
}

/* ── Autosave toast — green pill with dot ── */
.toast {
  position: fixed;
  bottom: 1.25rem; right: 1.25rem;
  z-index: 999;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: #0a7a5e;
  background: var(--bg-card);
  border: 1px solid #1aaa84;
  border-radius: 99px;
  padding: 6px 14px 6px 10px;
  box-shadow: 0 2px 12px rgba(13,138,106,0.15);
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 7px;
}
@media (prefers-color-scheme: dark) {
  .toast { color: #2ec99a; border-color: #1aaa84; background: #0d2a20; }
}
/* Green dot indicator */
.toast::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #1aaa84;
  flex-shrink: 0;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Content layout ── */
.dash {
  max-width: 740px;
  margin: 1.5rem auto 3rem;
  padding: 0 1rem;
}

.tab-pane        { display: none; }
.tab-pane.active { display: block; }

.pane-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border-1);
}
.pane-title          { font-family: var(--font-logo); font-size: 22px; font-weight: 700; }
.pane-title.now-col  { color: var(--tab-now); }
.pane-title.fire-col { color: var(--tab-fire); }
.pane-sub            { font-size: 13px; color: var(--text-3); font-style: italic; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-1);
  border-radius: var(--r-xl);
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.section-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 1.25rem 0 0.6rem;
}
.section-label:first-child { margin-top: 0; }

.divider { border: none; border-top: 1px solid var(--border-1); margin: 1.25rem 0; }

/* ── Summary metric cards ── */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0,1fr));
  gap: 8px;
}
@media (max-width: 580px) { .metric-grid { grid-template-columns: repeat(2,1fr); } }

.metric {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: var(--r-md);
  padding: 0.7rem 0.85rem;
}
.metric .lbl { font-size: 10px; font-weight: 500; color: var(--text-3); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.02em; }
.metric .val { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.metric .sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.metric.c-green  { border-color: var(--green-border); } .metric.c-green  .val { color: var(--green);  }
.metric.c-blue   { border-color: var(--blue-border);  } .metric.c-blue   .val { color: var(--blue);   }
.metric.c-red    { border-color: var(--red-border);   } .metric.c-red    .val { color: var(--red);    }
.metric.c-purple { border-color: var(--purple-border);} .metric.c-purple .val { color: var(--purple); }
.metric.c-amber  { border-color: var(--amber-border); } .metric.c-amber  .val { color: var(--amber);  }

/* ── Expense section boxes ── */
.box-shared {
  background: var(--blue-bg);
  border: 1px solid var(--blue-box);
  border-radius: var(--r-lg);
  padding: 1rem;
  margin-bottom: 0.5rem;
}
.box-personal {
  background: var(--green-bg);
  border: 1px solid var(--green-box);
  border-radius: var(--r-lg);
  padding: 1rem;
  margin-bottom: 0.5rem;
}
.box-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  margin-bottom: 0.75rem;
}
.box-shared .box-title   { color: var(--blue);  }
.box-personal .box-title { color: var(--green); }

.box-chevron {
  font-size: 9px;
  transition: transform 0.2s ease;
  opacity: 0.6;
  flex-shrink: 0;
}
.box-collapsed .box-chevron { transform: rotate(-90deg); }

/* When collapsed: hide rows, remove top border on total */
.box-collapsed .expense-rows  { display: none; }
.box-collapsed .section-total { margin-top: 0; border-top: none; padding-top: 0; }

/* Shared account card */
.shared-acc-card {
  border: 1px dashed var(--purple-border);
  border-radius: var(--r-md);
  padding: 0.6rem 1rem;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  flex-wrap: wrap;
}
.sa-label { flex: 1; font-size: 13px; font-weight: 400; color: var(--text-1); min-width: 80px; }
.sa-note  { font-size: 11px; color: var(--text-3); }
.sa-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: var(--purple-bg); color: var(--purple); white-space: nowrap; letter-spacing: 0.02em; }

/* Section totals */
.section-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 8px;
  margin-top: 6px;
  border-top: 1px solid rgba(0,0,0,0.08);
  font-size: 13px;
  font-weight: 500;
}
.box-shared .section-total   { color: var(--blue);  border-top-color: rgba(26,95,168,0.15); }
.box-personal .section-total { color: var(--green); border-top-color: rgba(10,122,94,0.15); }

/* ── Expense rows ── */
.expense-rows { display: flex; flex-direction: column; gap: 1px; }

.erow {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 6px;
  transition: background 0.12s;
}
.erow:hover { background: rgba(0,0,0,0.04); }
@media (prefers-color-scheme: dark) { .erow:hover { background: rgba(255,255,255,0.04); } }

.ename { font-size: 13px; font-weight: 400; color: var(--text-1); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.enote { font-size: 10px; color: var(--text-3); white-space: nowrap; }
.eamt  { font-size: 13px; font-weight: 500; color: var(--text-1); text-align: right; min-width: 58px; }

/* ── Spinners ── */
.spin-wrap { display: flex; align-items: center; }
.spin-wrap button {
  width: 22px; height: 22px;
  border: 1px solid var(--border-2);
  background: var(--bg-card);
  color: var(--text-2);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
  line-height: 1;
  font-family: var(--font-ui);
}
.spin-wrap button:first-child { border-radius: 4px 0 0 4px; }
.spin-wrap button:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
.spin-wrap button:hover { background: var(--bg-hover); }
.spin-val {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-1);
  min-width: 52px;
  text-align: center;
  border: 1px solid var(--border-1);
  border-left: none; border-right: none;
  height: 22px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-card);
  font-family: var(--font-ui);
}

/* ── Income rows ── */
.income-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.income-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  background: var(--bg-sub);
  border-radius: 6px;
}
.iname { font-size: 13px; font-weight: 400; color: var(--text-1); }

/* ── Partner row ── */
.p-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-radius: var(--r-md);
  border: 1px solid var(--border-1);
}
.plbl { font-size: 13px; font-weight: 400; color: var(--text-2); }
.pval { font-size: 13px; font-weight: 500; color: var(--green); }

/* ── Donut chart ── */
.chart-wrap   { position: relative; width: 100%; height: 200px; margin-top: 0.75rem; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 4px 0; margin-top: 10px; }
</style>
</head>
<body>

<!-- ══ STICKY HEADER ══ -->
<div class="sticky-header">
  <div class="header-row">
    <!-- Logo — left -->
    <div class="header-logo">
      <span class="logo-x">X</span><span class="logo-rest">penses</span><span class="logo-sep">·</span><span class="logo-calc">Calculator</span>
    </div>
    <!-- Tabs — center -->
    <div class="header-tabs">
      <div class="tabs">
        <button class="tab-btn active" data-tab="now"  onclick="switchTab('now')">Now</button>
        <button class="tab-btn"        data-tab="fire" onclick="switchTab('fire')">FIRE</button>
      </div>
    </div>
    <!-- Actions — right -->
    <div class="header-actions">
      <button class="hbtn hbtn-drive"  id="btn-drive-save" onclick="driveSave()">☁ Save</button>
      <button class="hbtn hbtn-drive"  id="btn-drive-load" onclick="driveLoad()">☁ Load</button>
      <button class="hbtn hbtn-export" onclick="exportJSON()">↓ Export</button>
      <button class="hbtn hbtn-import" onclick="document.getElementById('import-input').click()">↑ Import</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
  <!-- Drive status -->
  <div class="drive-status-bar">
    <span class="drive-status" id="drive-status"></span>
  </div>
</div>

<!-- ══ AUTOSAVE TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ MAIN ══ -->
<div class="dash">
  <div class="tab-pane active" id="pane-now">
    <div class="pane-header">
      <span class="pane-title now-col">Now</span>
      <span class="pane-sub">Current monthly picture</span>
    </div>
    <div class="card" id="card-now"></div>
  </div>
  <div class="tab-pane" id="pane-fire">
    <div class="pane-header">
      <span class="pane-title fire-col">FIRE</span>
      <span class="pane-sub">Post-retirement monthly picture</span>
    </div>
    <div class="card" id="card-fire"></div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════════
const DRIVE_CLIENT_ID = '453884215011-bnuqib76c5lt7vr87g6e5sd59q7r2cip.apps.googleusercontent.com';
const DRIVE_SCOPE     = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILENAME  = 'xpenses_calculator_data.json';
const LS_KEY          = 'xpenses_calculator_v1';

// ════════════════════════════════════════════════════════════════════
//  ROW DEFINITIONS
//  To add a new expense line: add an entry here AND add its key+value
//  to DEFAULTS. Everything else renders automatically.
//
//  Fields:
//    key    — property name in state
//    label  — display label
//    step   — spinner increment (€)
//    yearly — true if the state value is annual (displayed as /12)
// ════════════════════════════════════════════════════════════════════
const SHARED_DEF = [
  { key: 'rent',        label: 'Rent',           step: 50 },
  { key: 'insurance',   label: 'Home insurance', step: 5  },
  { key: 'internet',    label: 'Internet',       step: 5  },
  { key: 'netflix',     label: 'Netflix',        step: 1  },
  { key: 'electricity', label: 'Electricity',    step: 10 },
];

const PERSONAL_DEF = [
  { key: 'lunch',       label: 'Lunch',                 step: 10 },
  { key: 'extras',      label: 'Extras',                step: 10 },
  { key: 'health',      label: 'Health',                step: 10 },
  { key: 'beer',        label: 'Beer',                  step: 5  },
  { key: 'smoothie',    label: 'Post-workout smoothie', step: 5  },
  { key: 'savings',     label: 'Savings',               step: 10 },
  { key: 'drums',       label: 'Drums',                 step: 5  },
  { key: 'billar',      label: 'Billar membership',     step: 10, yearly: true },
  { key: 'billarMonth', label: 'Billar monthly',        step: 5  },
  { key: 'chess',       label: 'Chess membership',      step: 5,  yearly: true },
  { key: 'amazonPrime', label: 'Amazon Prime',          step: 5,  yearly: true },
  { key: 'phone',       label: 'Phone',                 step: 1  },
];

// Chart slices — fn() returns the slice value from state
const CHART_CATS = [
  { label: 'Rent',             color: '#3d8fe0', fn: s => s.rent },
  { label: 'Shared account',   color: '#8070e0', fn: s => s.sharedAcc },
  { label: 'Electricity',      color: '#1aaa84', fn: s => s.electricity },
  { label: 'Utilities & svcs', color: '#4a9fd0', fn: s => s.internet + s.netflix + s.insurance },
  { label: 'Food & going out', color: '#c47a00', fn: s => s.lunch + s.beer },
  { label: 'Health & sport',   color: '#d05830', fn: s => s.health + s.smoothie + s.billarMonth + s.billar/12 + s.chess/12 + s.drums },
  { label: 'Subscriptions',    color: '#c04880', fn: s => s.amazonPrime/12 + s.phone },
  { label: 'Savings',          color: '#6a9a20', fn: s => s.savings },
  { label: 'Extras',           color: '#909088', fn: s => s.extras },
];

// ════════════════════════════════════════════════════════════════════
//  DEFAULT STATE
//  Two independent scenarios. Add new keys here alongside the matching
//  entry in SHARED_DEF or PERSONAL_DEF above.
// ════════════════════════════════════════════════════════════════════
const DEFAULTS = {
  now: {
    salary: 2000, tickets: 200,
    rent: 1450, insurance: 25, internet: 40, netflix: 15, electricity: 120,
    sharedAcc: 600,
    phone: 10, amazonPrime: 69, smoothie: 30, beer: 50, chess: 90,
    billar: 150, billarMonth: 10, lunch: 100, extras: 100,
    health: 120, drums: 10, savings: 50,
    partnerFixed: 630,
  },
  fire: {
    salary: 0, tickets: 500,
    rent: 900, insurance: 20, internet: 40, netflix: 15, electricity: 80,
    sharedAcc: 400,
    phone: 10, amazonPrime: 69, smoothie: 30, beer: 50, chess: 90,
    billar: 150, billarMonth: 10, lunch: 60, extras: 150,
    health: 120, drums: 10, savings: 0,
    partnerFixed: 400,
  },
};

// ════════════════════════════════════════════════════════════════════
//  RUNTIME STATE
// ════════════════════════════════════════════════════════════════════
let states = JSON.parse(JSON.stringify(DEFAULTS));
const charts = { now: null, fire: null };

// ════════════════════════════════════════════════════════════════════
//  FORMATTERS
// ════════════════════════════════════════════════════════════════════
const fmt      = n => '€' + Math.round(n).toLocaleString('de-DE');
const fmtd     = n => '€' + (Math.round(n * 100) / 100).toFixed(2);
const fmtSmart = n => (n % 1 === 0) ? fmt(n) : fmtd(n);

// ════════════════════════════════════════════════════════════════════
//  DERIVED VALUES
// ════════════════════════════════════════════════════════════════════
function derived(s) {
  const sharedTotal = s.rent + s.insurance + s.internet + s.netflix + s.electricity;
  const personalMonthly = PERSONAL_DEF.reduce((sum, def) => {
    return sum + (def.yearly ? s[def.key] / 12 : s[def.key]);
  }, 0);
  const gross    = sharedTotal + s.sharedAcc + personalMonthly;
  const net      = gross - s.partnerFixed;
  const income   = s.salary + s.tickets;
  const leftover = income - net;
  return { sharedTotal, personalMonthly, gross, net, income, leftover };
}

// ════════════════════════════════════════════════════════════════════
//  LOCAL STORAGE
// ════════════════════════════════════════════════════════════════════
function saveLocal(tab) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(states));
    showToast(tab === 'now' ? 'Now · saved' : tab === 'fire' ? 'FIRE · saved' : 'Saved');
  } catch (_) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.now && saved.fire) {
      states.now  = { ...DEFAULTS.now,  ...saved.now  };
      states.fire = { ...DEFAULTS.fire, ...saved.fire };
    }
  } catch (_) {}
}

// ════════════════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ════════════════════════════════════════════════════════════════════
//  EXPORT / IMPORT JSON
// ════════════════════════════════════════════════════════════════════
function exportJSON() {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(states, null, 2)], { type: 'application/json' })),
    download: DRIVE_FILENAME,
  });
  a.click();
  showToast('Exported ✓');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const saved = JSON.parse(e.target.result);
      if (!saved.now || !saved.fire) throw new Error('invalid');
      states.now  = { ...DEFAULTS.now,  ...saved.now  };
      states.fire = { ...DEFAULTS.fire, ...saved.fire };
      saveLocal(null);
      render('now');
      render('fire');
      driveSetStatus('JSON imported ✓', 'ok');
    } catch (_) {
      driveSetStatus('Import failed — invalid file', 'err');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════════════════════════════════
//  GOOGLE DRIVE SYNC
//  Uses Google Identity Services (GIS).
//  initTokenClient() called fresh each time + FormData uploads —
//  both required for cross-browser/cross-device reliability.
// ════════════════════════════════════════════════════════════════════
let gdToken  = null;
let gdFileId = null;

function driveSetStatus(msg, cls) {
  const el = document.getElementById('drive-status');
  el.textContent = msg;
  el.className = 'drive-status' + (cls ? ' ' + cls : '');
}

function driveSetBusy(busy) {
  document.getElementById('btn-drive-save').disabled = busy;
  document.getElementById('btn-drive-load').disabled = busy;
}

function gdAuth(callback) {
  if (gdToken) { callback(gdToken); return; }
  driveSetStatus('Connecting to Google…', 'working');
  driveSetBusy(true);
  const client = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: response => {
      if (response.error) {
        driveSetStatus('Sign-in failed: ' + response.error, 'err');
        driveSetBusy(false);
        return;
      }
      gdToken = response.access_token;
      driveSetStatus('Connected to Google Drive', 'ok');
      callback(gdToken);
    },
  });
  client.requestAccessToken();
}

function gdFindFile(token, callback) {
  if (gdFileId) { callback(gdFileId); return; }
  fetch(
    'https://www.googleapis.com/drive/v3/files?q=name%3D%22' + DRIVE_FILENAME + '%22+and+trashed%3Dfalse&fields=files(id,name)',
    { headers: { Authorization: 'Bearer ' + token } }
  )
  .then(r => r.json())
  .then(res => {
    gdFileId = (res.files && res.files.length > 0) ? res.files[0].id : null;
    callback(gdFileId);
  })
  .catch(() => { driveSetStatus('Drive search failed', 'err'); driveSetBusy(false); });
}

function driveSave() {
  driveSetBusy(true);
  driveSetStatus('Saving to Google Drive…', 'working');
  gdAuth(token => {
    const blob = new Blob([JSON.stringify(states, null, 2)], { type: 'application/json' });
    gdFindFile(token, fileId => {
      const url    = 'https://www.googleapis.com/upload/drive/v3/files' + (fileId ? '/' + fileId : '') + '?uploadType=multipart';
      const method = fileId ? 'PATCH' : 'POST';
      const form   = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DRIVE_FILENAME, mimeType: 'application/json' })], { type: 'application/json' }));
      form.append('file', blob);
      fetch(url, { method, headers: { Authorization: 'Bearer ' + token }, body: form })
        .then(r => r.json())
        .then(res => {
          if (res.error) throw new Error(JSON.stringify(res.error));
          if (!fileId) gdFileId = res.id;
          driveSetStatus('✓ Saved to Google Drive — ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }), 'ok');
          driveSetBusy(false);
        })
        .catch(err => {
          if (String(err).includes('401')) { gdToken = null; gdFileId = null; driveSetStatus('Session expired — click Save again', 'err'); }
          else driveSetStatus('Save failed — try again', 'err');
          driveSetBusy(false);
        });
    });
  });
}

function driveLoad() {
  driveSetBusy(true);
  driveSetStatus('Loading from Google Drive…', 'working');
  gdAuth(token => {
    gdFindFile(token, fileId => {
      if (!fileId) { driveSetStatus('No file found in Drive — save first', 'err'); driveSetBusy(false); return; }
      fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', { headers: { Authorization: 'Bearer ' + token } })
        .then(r => r.json())
        .then(saved => {
          if (!saved.now || !saved.fire) throw new Error('invalid');
          states.now  = { ...DEFAULTS.now,  ...saved.now  };
          states.fire = { ...DEFAULTS.fire, ...saved.fire };
          saveLocal(null);
          render('now');
          render('fire');
          driveSetStatus('✓ Loaded from Google Drive — ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }), 'ok');
          driveSetBusy(false);
        })
        .catch(err => {
          if (String(err).includes('401')) { gdToken = null; driveSetStatus('Session expired — click Load again', 'err'); }
          else driveSetStatus('Load failed — try again', 'err');
          driveSetBusy(false);
        });
    });
  });
}

// ════════════════════════════════════════════════════════════════════
//  SPINNER FACTORY
// ════════════════════════════════════════════════════════════════════
function makeSpin(containerId, tab, key, step, min = 0) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<button>−</button><div class="spin-val" id="${tab}-sv-${key}"></div><button>+</button>`;
  el.children[0].onclick = () => { states[tab][key] = Math.max(min, states[tab][key] - step); render(tab); saveLocal(tab); };
  el.children[2].onclick = () => { states[tab][key] = Math.max(min, states[tab][key] + step); render(tab); saveLocal(tab); };
}

// ════════════════════════════════════════════════════════════════════
//  BUILD CARD — generates HTML for one tab, then wires all spinners
// ════════════════════════════════════════════════════════════════════
function buildCard(tab) {
  const rowsHTML = defs => defs.map(def => `
    <div class="erow">
      <span class="ename">${def.label}</span>
      <span class="enote" id="${tab}-note-${def.key}"></span>
      <div class="spin-wrap" id="${tab}-spin-${def.key}"></div>
      <span class="eamt" id="${tab}-amt-${def.key}">—</span>
    </div>`).join('');

  document.getElementById(`card-${tab}`).innerHTML = `
    <p class="section-label">Monthly income</p>
    <div class="income-grid">
      <div style="display:flex;flex-direction:column;gap:6px">
        <div class="income-row">
          <span class="iname">Income</span>
          <div class="spin-wrap" id="${tab}-spin-salary"></div>
          <span class="eamt" id="${tab}-amt-salary">—</span>
        </div>
        <div class="income-row">
          <span class="iname">RT / Barista</span>
          <div class="spin-wrap" id="${tab}-spin-tickets"></div>
          <span class="eamt" id="${tab}-amt-tickets">—</span>
        </div>
      </div>
      <div class="metric c-green">
        <div class="lbl">Total income</div>
        <div class="val" id="${tab}-m-income">—</div>
        <div class="sub">per month</div>
      </div>
    </div>

    <hr class="divider">
    <p class="section-label">Monthly summary</p>
    <div class="metric-grid">
      <div class="metric c-red">   <div class="lbl">You pay (gross)</div>      <div class="val" id="${tab}-m-gross">—</div>      <div class="sub">before reimbursement</div></div>
      <div class="metric c-green"> <div class="lbl">Partner covers</div>       <div class="val" id="${tab}-m-partner">—</div>    <div class="sub">her shared half</div></div>
      <div class="metric c-blue">  <div class="lbl">Your net cost</div>        <div class="val" id="${tab}-m-net">—</div>        <div class="sub">what you actually pay</div></div>
      <div class="metric c-amber"> <div class="lbl">Shared account</div>       <div class="val" id="${tab}-m-shared-acc">—</div> <div class="sub">each contributes</div></div>
      <div class="metric c-purple" id="${tab}-leftover-card">
        <div class="lbl">Left at end of month</div>
        <div class="val" id="${tab}-m-leftover">—</div>
        <div class="sub">income minus net cost</div>
      </div>
    </div>

    <hr class="divider">
    <div class="box-shared" id="${tab}-box-shared">
      <div class="box-title" onclick="toggleBox('${tab}-box-shared')">
        <span>Shared expenses — you pay, she reimburses</span>
        <span class="box-chevron">▼</span>
      </div>
      <div class="expense-rows">${rowsHTML(SHARED_DEF)}</div>
      <div class="section-total"><span>Total shared expenses</span><span id="${tab}-total-shared">—</span></div>
    </div>

    <div class="shared-acc-card">
      <span class="sa-label">Shared account</span>
      <span class="sa-note" id="${tab}-sa-note">each puts in €600</span>
      <div class="spin-wrap" id="${tab}-spin-sharedAcc"></div>
      <span class="eamt" id="${tab}-amt-sharedAcc">—</span>
      <span class="sa-badge">equal split</span>
    </div>

    <div class="box-personal" id="${tab}-box-personal">
      <div class="box-title" onclick="toggleBox('${tab}-box-personal')">
        <span>Personal expenses</span>
        <span class="box-chevron">▼</span>
      </div>
      <div class="expense-rows">${rowsHTML(PERSONAL_DEF)}</div>
      <div class="section-total"><span>Total personal expenses</span><span id="${tab}-total-personal">—</span></div>
    </div>

    <hr class="divider">
    <p class="section-label">Her share of shared expenses</p>
    <div class="p-row">
      <span class="plbl">Monthly transfer from partner</span>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="spin-wrap" id="${tab}-spin-partnerFixed"></div>
        <span class="pval" id="${tab}-p-fixed">—</span>
      </div>
    </div>

    <hr class="divider">
    <p class="section-label">Expense breakdown</p>
    <div class="chart-wrap"><canvas id="${tab}-pie-chart"></canvas></div>
    <div class="chart-legend" id="${tab}-chart-legend"></div>
  `;

  makeSpin(`${tab}-spin-salary`,       tab, 'salary',       100);
  makeSpin(`${tab}-spin-tickets`,      tab, 'tickets',      10);
  makeSpin(`${tab}-spin-sharedAcc`,    tab, 'sharedAcc',    50);
  makeSpin(`${tab}-spin-partnerFixed`, tab, 'partnerFixed', 10);
  SHARED_DEF.forEach(def   => makeSpin(`${tab}-spin-${def.key}`, tab, def.key, def.step));
  PERSONAL_DEF.forEach(def => makeSpin(`${tab}-spin-${def.key}`, tab, def.key, def.step));
}

// ════════════════════════════════════════════════════════════════════
//  RENDER — updates all displayed values for one tab
// ════════════════════════════════════════════════════════════════════
function render(tab) {
  const s = states[tab];
  const d = derived(s);
  const p = tab + '-';

  document.getElementById(`${p}sv-salary`).textContent   = fmt(s.salary);
  document.getElementById(`${p}amt-salary`).textContent  = fmt(s.salary);
  document.getElementById(`${p}sv-tickets`).textContent  = fmt(s.tickets);
  document.getElementById(`${p}amt-tickets`).textContent = fmt(s.tickets);
  document.getElementById(`${p}m-income`).textContent    = fmt(d.income);

  document.getElementById(`${p}m-gross`).textContent      = fmt(d.gross);
  document.getElementById(`${p}m-partner`).textContent    = fmt(s.partnerFixed);
  document.getElementById(`${p}m-net`).textContent        = fmt(d.net);
  document.getElementById(`${p}m-shared-acc`).textContent = fmt(s.sharedAcc);
  document.getElementById(`${p}m-leftover`).textContent   = fmt(d.leftover);
  document.getElementById(`${p}leftover-card`).className  = d.leftover >= 0 ? 'metric c-purple' : 'metric c-red';

  SHARED_DEF.forEach(def => {
    document.getElementById(`${p}sv-${def.key}`).textContent  = fmt(s[def.key]);
    document.getElementById(`${p}amt-${def.key}`).textContent = fmt(s[def.key]);
  });
  document.getElementById(`${p}total-shared`).textContent = fmt(d.sharedTotal);

  document.getElementById(`${p}sv-sharedAcc`).textContent  = fmt(s.sharedAcc);
  document.getElementById(`${p}amt-sharedAcc`).textContent = fmt(s.sharedAcc);
  document.getElementById(`${p}sa-note`).textContent       = `each puts in €${s.sharedAcc}`;

  PERSONAL_DEF.forEach(def => {
    const raw     = s[def.key];
    const monthly = def.yearly ? raw / 12 : raw;
    document.getElementById(`${p}sv-${def.key}`).textContent   = fmt(raw);
    document.getElementById(`${p}amt-${def.key}`).textContent  = fmtSmart(monthly);
    document.getElementById(`${p}note-${def.key}`).textContent = def.yearly ? `€${raw}/yr → €${(raw / 12).toFixed(2)}/mo` : '';
  });
  document.getElementById(`${p}total-personal`).textContent = fmt(d.personalMonthly);

  document.getElementById(`${p}sv-partnerFixed`).textContent = fmt(s.partnerFixed);
  document.getElementById(`${p}p-fixed`).textContent         = fmt(s.partnerFixed);

  const cats      = CHART_CATS.map(c => ({ ...c, value: c.fn(s) }));
  const isDark    = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const borderCol = isDark ? '#1e1d1b' : '#ffffff';

  if (!charts[tab]) {
    charts[tab] = new Chart(document.getElementById(`${tab}-pie-chart`), {
      type: 'doughnut',
      data: {
        labels:   cats.map(c => c.label),
        datasets: [{ data: cats.map(c => c.value), backgroundColor: cats.map(c => c.color), borderWidth: 2, borderColor: borderCol }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '58%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => {
            const tot = ctx.dataset.data.reduce((a, b) => a + b, 0);
            return ` €${Math.round(ctx.parsed)} — ${Math.round(ctx.parsed / tot * 100)}%`;
          }}},
        },
      },
    });
  } else {
    charts[tab].data.datasets[0].data = cats.map(c => c.value);
    charts[tab].update('none');
  }

  document.getElementById(`${tab}-chart-legend`).innerHTML = cats.map(c =>
    `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text-2);margin-right:10px">
      <span style="width:9px;height:9px;border-radius:2px;background:${c.color};flex-shrink:0"></span>${c.label}
    </span>`
  ).join('');
}

// ════════════════════════════════════════════════════════════════════
//  COLLAPSIBLE BOXES
// ════════════════════════════════════════════════════════════════════
function toggleBox(id) {
  document.getElementById(id).classList.toggle('box-collapsed');
}

// ════════════════════════════════════════════════════════════════════
//  TAB SWITCHING
// ════════════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b  => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `pane-${tab}`));
  render(tab);
}

// ════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════
loadLocal();
['now', 'fire'].forEach(tab => { buildCard(tab); render(tab); });
</script>
