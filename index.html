<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --surface: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.75);
    --subtle: rgba(240,240,245,0.6);
    --accent-tracker: #ffd166;
    --accent-tracker-dim: rgba(255,209,102,0.12);
    --accent-tracker-glow: rgba(255,209,102,0.25);
    --accent-calc: #00e5a0;
    --accent-calc-dim: rgba(0,229,160,0.12);
    --accent-calc-glow: rgba(0,229,160,0.25);
    --accent-planner: #a78bfa;
    --accent-planner-dim: rgba(167,139,250,0.12);
    --accent-planner-glow: rgba(167,139,250,0.25);
    --accent-fire: #7dd3fc;
    --accent-fire-dim: rgba(125,211,252,0.12);
    --accent-fire-glow: rgba(125,211,252,0.25);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 0 0 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(123,143,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(255,107,107,0.05) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 30%, rgba(0,229,160,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 0 20px;
  }

  header {
    padding: 52px 0 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    animation: fadeUp 0.4s both;
  }

  .logo-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--subtle);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .logo-title {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f0f0f5 0%, rgba(240,240,245,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-meta { text-align: right; padding-top: 6px; }
  .date-display {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--subtle);
    text-transform: uppercase;
    margin: 0 0 14px;
  }

  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .tile {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px 38px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.2s;
    animation: fadeUp 0.5s both;
  }
  .tile:nth-child(1) { animation-delay: 0.05s; }
  .tile:nth-child(2) { animation-delay: 0.1s; }
  .tile:nth-child(3) { animation-delay: 0.15s; }
  .tile:nth-child(4) { animation-delay: 0.2s; }

  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tile:hover { transform: translateY(-2px); }
  .tile:hover::before { opacity: 1; }
  .tile:active { transform: translateY(0) scale(0.98); }

  .tile-tracker::before { background: radial-gradient(ellipse at top left, var(--accent-tracker-dim), transparent 70%); }
  .tile-tracker:hover { border-color: var(--accent-tracker-glow); }
  .tile-calc::before { background: radial-gradient(ellipse at top left, var(--accent-calc-dim), transparent 70%); }
  .tile-calc:hover { border-color: var(--accent-calc-glow); }
  .tile-planner::before { background: radial-gradient(ellipse at top left, var(--accent-planner-dim), transparent 70%); }
  .tile-planner:hover { border-color: var(--accent-planner-glow); }
  .tile-fire::before { background: radial-gradient(ellipse at top left, var(--accent-fire-dim), transparent 70%); }
  .tile-fire:hover { border-color: var(--accent-fire-glow); }

  .tile-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .tile-tracker .tile-icon { background: var(--accent-tracker-dim); }
  .tile-calc .tile-icon    { background: var(--accent-calc-dim); }
  .tile-planner .tile-icon { background: var(--accent-planner-dim); }
  .tile-fire .tile-icon    { background: var(--accent-fire-dim); }

  .tile-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .tile-tracker .tile-name { color: var(--accent-tracker); }
  .tile-calc .tile-name    { color: var(--accent-calc); }
  .tile-planner .tile-name { color: var(--accent-planner); }
  .tile-fire .tile-name    { color: var(--accent-fire); }

  .tile-stats {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat-label {
    font-size: 9.5px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--subtle);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.15;
  }
  .stat-value.big { font-size: 20px; }

  .stat-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 2px 0;
  }

  .tile-arrow {
    position: absolute;
    bottom: 16px;
    right: 18px;
    font-size: 14px;
    color: var(--subtle);
    transition: color 0.2s, transform 0.2s;
    z-index: 1;
  }
  .tile:hover .tile-arrow { color: var(--muted); transform: translate(2px, -2px); }

  .tile-footer {
    position: absolute;
    bottom: 16px;
    left: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--subtle);
    letter-spacing: 0.05em;
    z-index: 1;
  }

  .no-data {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--subtle);
    font-style: italic;
  }

  .live-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 5px;
    animation: pulse 2s infinite;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .bottom-bar {
    margin-top: 28px;
    padding: 18px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: fadeUp 0.5s 0.25s both;
  }
  .bottom-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .refresh-btn:hover { border-color: var(--border-hover); color: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 380px) {
    .tiles { grid-template-columns: 1fr; }
    .tile { min-height: auto; }
    .logo-title { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-block">
      <div class="logo-eyebrow">personal dashboard</div>
      <div class="logo-title">Life Hub</div>
    </div>
    <div class="header-meta">
      <div class="date-display" id="date-display"></div>
    </div>
  </header>

  <div class="section-label">your apps</div>

  <div class="tiles">

    <a class="tile tile-tracker" href="XPENSE_TRACKER.html">
      <div class="tile-icon">💳</div>
      <div class="tile-name">Xpenser</div>
      <div class="tile-stats" id="stats-tracker"><div class="no-data">Loading…</div></div>
      <div class="tile-footer" id="footer-tracker"></div>
      <div class="tile-arrow">↗</div>
    </a>

    <a class="tile tile-calc" href="XPENSES_CALCULATOR.html">
      <div class="tile-icon">🧮</div>
      <div class="tile-name">Calculator</div>
      <div class="tile-stats" id="stats-calc"><div class="no-data">Loading…</div></div>
      <div class="tile-footer" id="footer-calc"></div>
      <div class="tile-arrow">↗</div>
    </a>

    <a class="tile tile-planner" href="WEEK_PLANNER.html">
      <div class="tile-icon">📅</div>
      <div class="tile-name">Week Planner</div>
      <div class="tile-stats" id="stats-planner"><div class="no-data">Loading…</div></div>
      <div class="tile-footer" id="footer-planner"></div>
      <div class="tile-arrow">↗</div>
    </a>

    <a class="tile tile-fire" href="FIRE_SIM.html">
      <div class="tile-icon">🔥</div>
      <div class="tile-name">FIRE Sim</div>
      <div class="tile-stats" id="stats-fire"><div class="no-data">Loading…</div></div>
      <div class="tile-footer" id="footer-fire"></div>
      <div class="tile-arrow">↗</div>
    </a>

  </div>

  <div class="bottom-bar">
    <span class="bottom-label"><span class="live-dot" style="color:#00e5a0;"></span>live from local storage</span>
    <button class="refresh-btn" onclick="loadAll()">↺ Refresh</button>
  </div>

</div>
<script>
// ── date ─────────────────────────────────────────────────────────
(function() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').innerHTML =
    days[d.getDay()] + '<br>' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
})();

// ── helpers ──────────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(n);
}
function safeGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
function safeParse(v) { try { return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function statHTML(label, value, big) {
  return `<div class="stat"><div class="stat-label">${label}</div><div class="stat-value${big?' big':''}">${value}</div></div>`;
}
function noData(msg) { return `<div class="no-data">${msg||'No data yet'}</div>`; }
function fmtAgo(iso) {
  if (!iso) return '';
  try {
    const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (diff < 1) return 'saved just now';
    if (diff < 60) return `saved ${diff}m ago`;
    const h = Math.floor(diff/60);
    if (h < 24) return `saved ${h}h ago`;
    return `saved ${Math.floor(h/24)}d ago`;
  } catch(e) { return ''; }
}

// ── XPENSE TRACKER ───────────────────────────────────────────────
function loadTracker() {
  const data = safeParse(safeGet('depenses_data_v1'));
  const el = document.getElementById('stats-tracker');
  const foot = document.getElementById('footer-tracker');
  if (!data) { el.innerHTML = noData('Open tracker to start'); return; }

  const now = new Date();
  const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const curYear = String(now.getFullYear());
  let monthTotal = 0, yearTotal = 0;

  Object.entries(data).forEach(([k, entries]) => {
    if (!Array.isArray(entries)) return;
    const sum = entries.reduce((s, e) => s + (parseFloat(e.amt)||0), 0);
    if (k.startsWith(curYear)) yearTotal += sum;
    if (k.startsWith(curMonth)) monthTotal += sum;
  });

  el.innerHTML =
    statHTML('This month', fmt(monthTotal), true) +
    '<div class="stat-divider"></div>' +
    statHTML('This year', fmt(yearTotal));
  foot.textContent = fmtAgo(safeGet('depenses_last_save'));
}

// ── XPENSES CALCULATOR ───────────────────────────────────────────
// Structure: { now: { salary, tickets, rent, ... }, fire: { ... } }
// Income = salary + tickets. Left = income - all expense fields.
function calcLeft(tab) {
  if (!tab) return null;
  const income = (parseFloat(tab.salary)||0) + (parseFloat(tab.tickets)||0);
  const expKeys = ['rent','insurance','internet','netflix','electricity','sharedAcc',
    'phone','amazonPrime','smoothie','beer','chess','billar','billarMonth',
    'lunch','extras','health','drums','savings','partnerFixed'];
  const expenses = expKeys.reduce((s, k) => s + (parseFloat(tab[k])||0), 0);
  return income - expenses;
}

function loadCalc() {
  const states = safeParse(safeGet('xpenses_calculator_v1'));
  const el = document.getElementById('stats-calc');
  if (!states || (!states.now && !states.fire)) {
    el.innerHTML = noData('Open calculator to start'); return;
  }
  const nowLeft = calcLeft(states.now);
  const fireLeft = calcLeft(states.fire);
  el.innerHTML =
    statHTML('Left / month · now', fmt(nowLeft), true) +
    '<div class="stat-divider"></div>' +
    statHTML('Left / month · FIRE', fmt(fireLeft));
}

// ── WEEK PLANNER ─────────────────────────────────────────────────
// Block structure: { aid, d, h, dur } — dur is hours (directly on each block)
function loadPlanner() {
  const el = document.getElementById('stats-planner');
  const curWeek = parseInt(safeGet('weekplan_curweek') || '0') || 0;
  const curPlaces = safeParse(safeGet('weekplan_week' + curWeek)) || {};
  const blocks = Object.values(curPlaces);

  if (blocks.length === 0) {
    let anyData = false;
    for (let w = 0; w < 4; w++) {
      if (Object.keys(safeParse(safeGet('weekplan_week'+w)) || {}).length > 0) { anyData = true; break; }
    }
    el.innerHTML = anyData
      ? statHTML('Week '+(curWeek+1), '0h planned', true)
      : noData('Open planner to start');
    return;
  }

  // Each block object has a dur field = hours. Sum them directly.
  const totalHours = blocks.reduce((s, b) => s + (b && typeof b==='object' ? (parseFloat(b.dur)||0) : 0), 0);

  el.innerHTML =
    statHTML('Current week', 'Week ' + (curWeek + 1)) +
    '<div class="stat-divider"></div>' +
    statHTML('Hours planned', totalHours + 'h', true);
}

// ── FIRE SIM ─────────────────────────────────────────────────────
// Values stored in €K (pea:100 = €100,000). Use activeScenario snapshot.
function loadFire() {
  const state = safeParse(safeGet('fire-sim-v1'));
  const el = document.getElementById('stats-fire');
  const foot = document.getElementById('footer-fire');
  if (!state) { el.innerHTML = noData('Open FIRE sim to start'); return; }

  // Pick the active scenario snapshot
  let S = state.S;
  let scenarioName = '';
  if (Array.isArray(state.scenarios) && typeof state.activeScenario === 'number') {
    const snap = state.scenarios[state.activeScenario];
    if (snap && snap.snap && snap.snap.S) S = snap.snap.S;
    if (snap && snap.name) scenarioName = snap.name;
  }
  if (!S) { el.innerHTML = noData('Run a simulation first'); return; }

  // French assets in €K: pea + av + cto + liv + cash
  const frK  = (S.pea||0) + (S.av||0) + (S.cto||0) + (S.liv||0) + (S.cash||0);
  // Colombian assets in €K: cop1..cop4
  const coK  = (S.cop1||0) + (S.cop2||0) + (S.cop3||0) + (S.cop4||0);
  const totK = frK + coK;

  const fmtK = n => fmt(n * 1000);

  el.innerHTML =
    statHTML('Total' + (scenarioName ? ` · ${scenarioName}` : ''), fmtK(totK), true) +
    '<div class="stat-divider"></div>' +
    statHTML('🇫🇷 French', fmtK(frK)) +
    '<div class="stat-divider"></div>' +
    statHTML('🇨🇴 Colombian', fmtK(coK));

  if (state.savedAt) foot.textContent = fmtAgo(state.savedAt);
}

// ── init ─────────────────────────────────────────────────────────
function loadAll() { loadTracker(); loadCalc(); loadPlanner(); loadFire(); }
loadAll();
</script>
</body>
</html>
